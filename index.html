    <!-- iOS Safari polyfill: audio elements don't have webkitEnterFullscreen.
         Clarity (and some iOS internals) try to call it on <audio> elements,
         causing "webkitEnterFullscreen is not a function" in 25% of sessions. -->
    <script>
      (function() {
        try {
          if (typeof HTMLAudioElement !== 'undefined' &&
              typeof HTMLAudioElement.prototype.webkitEnterFullscreen === 'undefined') {
            HTMLAudioElement.prototype.webkitEnterFullscreen = function() {};
            HTMLAudioElement.prototype.webkitExitFullscreen = function() {};
          }
        } catch(e) {}
      })();
    </script>
